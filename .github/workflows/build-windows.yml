name: Build Windows Executables

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup MSVC Developer Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: C:\vcpkg\installed
        key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-windows-

    - name: Configure CMake (Static Build)
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET="x64-windows-static" `
          -DBUILD_GUI=OFF `
          -DBUILD_TESTS=OFF `
          -DBUILD_BENCH=OFF `
          -DWITH_ZMQ=OFF `
          -DENABLE_WALLET=ON

    - name: Build Release
      run: cmake --build build --config Release --parallel 4

    - name: List built executables
      run: |
        Get-ChildItem -Path build\bin\Release\*.exe -ErrorAction SilentlyContinue
        Get-ChildItem -Path build\src\Release\*.exe -ErrorAction SilentlyContinue

    - name: Upload Windows Executables
      uses: actions/upload-artifact@v4
      with:
        name: bitcoin-core-windows-x64
        path: |
          build/bin/Release/*.exe
          build/src/Release/*.exe
        if-no-files-found: warn
        retention-days: 30

  build-windows-with-gui:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup MSVC Developer Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

    - name: Cache vcpkg packages (GUI)
      uses: actions/cache@v4
      with:
        path: C:\vcpkg\installed
        key: vcpkg-windows-gui-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-windows-gui-

    - name: Configure CMake (With GUI)
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET="x64-windows-static" `
          -DVCPKG_INSTALL_OPTIONS="--x-buildtrees-root=C:\bt" `
          -DBUILD_GUI=ON `
          -DBUILD_TESTS=OFF `
          -DBUILD_BENCH=OFF `
          -DWITH_ZMQ=ON `
          -DENABLE_WALLET=ON

    - name: Build Release with GUI
      run: cmake --build build --config Release --parallel 4

    - name: Upload Windows Executables (with GUI)
      uses: actions/upload-artifact@v4
      with:
        name: bitcoin-core-windows-x64-gui
        path: |
          build/bin/Release/*.exe
          build/src/Release/*.exe
        if-no-files-found: warn
        retention-days: 30
